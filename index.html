<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#1F1F1F" />

    <!-- Meta tags PWA: cuando el usuario hace "Agregar a Inicio" en iOS,
         la app abre en modo "standalone" (sin barra de URL de Safari, sin
         barra de asistente de formularios con chevrons, sin gestos de
         navegación). Se siente como una app nativa. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Meal Tracker" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="format-detection" content="telephone=no" />

    <title>Meal Tracker — Mauro Morón</title>
    <style>
      /* CSS inline crítico — muestra inmediatamente un splash limpio mientras
         Tailwind (CDN) y React se cargan. Sin esto, el usuario veía 2-3 segundos
         de HTML sin estilos. El splash se oculta solo cuando React monta. */
      html, body { margin: 0; padding: 0; background: #FBF9F3; font-family: -apple-system, system-ui, sans-serif; }
      #splash {
        position: fixed; inset: 0;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        background: #FBF9F3;
        z-index: 9999;
        transition: opacity 0.25s ease-out;
      }
      #splash .brand {
        font-size: 22px; letter-spacing: 0.12em; font-weight: 600;
        color: #1F1F1F; text-transform: uppercase;
      }
      #splash .sub {
        margin-top: 6px;
        font-size: 11px; letter-spacing: 0.05em;
        color: #8A9558; font-weight: 600;
      }
      #splash .dot {
        margin-top: 28px; width: 24px; height: 24px;
        border: 2px solid #E2DECC; border-top-color: #8A9558;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      /* Oculta el splash una vez que React montó */
      body.app-ready #splash { opacity: 0; pointer-events: none; }
    </style>
  </head>
  <body>
    <div id="splash">
      <div class="brand">Meal Tracker</div>
      <div class="sub">Entrena con Método</div>
      <div class="dot"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
